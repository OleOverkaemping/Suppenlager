<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Test</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="scanner.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        #scanner-container { 
            width: 100%; 
            height: 250px; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            margin-bottom: 15px; 
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        
        canvas.drawingBuffer { position: absolute; top: 0; left: 0; }

        .scan-btn { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 18px; 
            cursor: pointer; 
        }
        
        #scan-result { margin-top: 15px; font-size: 1.2em; color: #333; }
        .status-ok { color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Kamera Test</h2>
        <div id="scanner-container"></div>
        <button class="scan-btn" onclick="startScan()">Kamera starten</button>
        <p id="scan-result">Bereit zum Testen...</p>
    </div>
</body>
</html>
